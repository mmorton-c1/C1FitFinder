<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condition 1 — Find Your Case</title>
<style>
/* ============================================================
   CONDITION 1 PRODUCT FINDER WIDGET
   Single-file embed for Gorgias Help Center & Messaging Widget
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1-red:    #E4001B;
  --c1-black:  #171919;
  --c1-white:  #FFFFFF;
  --c1-gray:   #2a2d2d;
  --c1-lgray:  #f4f4f4;
  --c1-border: #e0e0e0;
  --c1-warn:   #ff9800;
  --radius:    4px;
  --font:      Arial, sans-serif;
}

body {
  font-family: var(--font);
  background: var(--c1-black);
  color: var(--c1-black);
  margin: 0;
  padding: 0;
}

.widget-wrap {
  max-width: 860px;
  margin: 0 auto;
  background: var(--c1-black);
}

/* HEADER */
.widget-header {
  background: var(--c1-black);
  padding: 20px 24px 16px;
  border-bottom: 3px solid var(--c1-red);
  display: flex;
  align-items: center;
  gap: 16px;
}
.widget-header img.logo {
  height: 32px;
  object-fit: contain;
}
.widget-header .tagline {
  color: var(--c1-white);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.widget-header .tagline span {
  color: var(--c1-red);
}

/* MAIN BODY */
.widget-body {
  background: var(--c1-lgray);
  padding: 24px;
}

/* ITEM BUILDER */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 10px;
}

.item-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}

.item-row {
  background: var(--c1-white);
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 148px 1fr auto;
  gap: 10px;
  align-items: start;
}

.item-row select.type-sel {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  color: var(--c1-black);
  background: var(--c1-lgray);
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  padding: 8px 10px;
  cursor: pointer;
  width: 100%;
}

.item-input-area {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.autocomplete-wrap {
  position: relative;
}

.autocomplete-wrap input {
  font-family: var(--font);
  font-size: 13px;
  color: var(--c1-black);
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  padding: 8px 10px;
  width: 100%;
  background: var(--c1-white);
}
.autocomplete-wrap input:focus { outline: 2px solid var(--c1-red); border-color: transparent; }

.autocomplete-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--c1-white);
  border: 1px solid var(--c1-red);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  z-index: 100;
  max-height: 180px;
  overflow-y: auto;
  display: none;
}
.autocomplete-dropdown.open { display: block; }
.autocomplete-dropdown li {
  list-style: none;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--c1-lgray);
}
.autocomplete-dropdown li:hover, .autocomplete-dropdown li.active { background: var(--c1-lgray); color: var(--c1-red); font-weight: 700; }

.manual-dims {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.manual-dims .dim-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  white-space: nowrap;
}
.manual-dims input[type="number"] {
  font-family: var(--font);
  font-size: 13px;
  width: 60px;
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  padding: 6px 8px;
  color: var(--c1-black);
  background: var(--c1-white);
  -moz-appearance: textfield;
}
.manual-dims input[type="number"]::-webkit-outer-spin-button,
.manual-dims input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
.manual-dims input[type="number"]:focus { outline: 2px solid var(--c1-red); border-color: transparent; }
.manual-dims .dim-sep { color: #aaa; font-size: 13px; }

/* ADDITION 1 — Firearm dimension display on autocomplete selection */
.selected-dims {
  font-size: 11px;
  color: #777;
  font-variant-numeric: tabular-nums;
  margin-top: -2px;
  display: none; /* hidden until a firearm is selected */
}
.selected-dims.visible { display: block; }

.remove-btn {
  background: none;
  border: 1px solid #ddd;
  border-radius: var(--radius);
  color: #aaa;
  font-size: 18px;
  line-height: 1;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  align-self: center;
}
.remove-btn:hover { background: #fee; border-color: var(--c1-red); color: var(--c1-red); }

.add-item-btn {
  background: none;
  border: 2px dashed #ccc;
  border-radius: var(--radius);
  color: #888;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: all 0.15s;
  margin-bottom: 18px;
}
.add-item-btn:hover { border-color: var(--c1-red); color: var(--c1-red); background: #fff5f5; }

.find-btn {
  background: var(--c1-red);
  color: var(--c1-white);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 32px;
  cursor: pointer;
  width: 100%;
  transition: background 0.15s;
}
.find-btn:hover { background: #c20018; }
.find-btn:active { background: #a30014; }

/* RESULTS */
.results-section {
  margin-top: 24px;
  display: none;
}
.results-section.visible { display: block; }

.results-header {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--c1-black);
  padding-bottom: 10px;
  border-bottom: 3px solid var(--c1-red);
  margin-bottom: 16px;
}

.suppression-banner {
  background: var(--c1-black);
  color: var(--c1-white);
  border-left: 4px solid var(--c1-red);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
  display: none;
}
.suppression-banner.visible { display: block; }

.results-group-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #888;
  margin: 18px 0 10px;
}
.results-group-label:first-child { margin-top: 0; }

.case-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 8px;
}

.case-card {
  background: var(--c1-white);
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.case-card.top-pick { border-color: var(--c1-red); border-width: 2px; }

.card-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--c1-red);
  color: var(--c1-white);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
}

.card-inner { padding: 14px; }
.card-case-num {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c1-red);
  margin-bottom: 3px;
}
.card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--c1-black);
  margin-bottom: 8px;
  line-height: 1.3;
}
.card-dims {
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}
.card-dims strong { color: var(--c1-black); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 12px;
}
.tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 2px;
  background: var(--c1-lgray);
  color: #555;
  border: 1px solid var(--c1-border);
}
.tag.tag-precut { background: #fff5f5; color: var(--c1-red); border-color: #ffc4c4; }
.tag.tag-pluck { background: #f0f7ff; color: #1565c0; border-color: #b3d4f7; }
.tag.tag-wheel { background: #f3f9f0; color: #2e7d32; border-color: #b8ddb4; }
.tag.tag-lidorg { background: #fffbf0; color: #e65100; border-color: #ffd999; }

.card-warn {
  font-size: 11px;
  /* PART 6: three-tier snug fit warning — amber/yellow, NOT red (red reserved for CTAs) */
  color: #7a5c00;
  font-weight: 700;
  margin-bottom: 8px;
  padding: 5px 8px;
  background: #fff8e1;
  border: 1px solid #ffe082;
  border-radius: 2px;
}

/* PART 2/RESULT CARDS: storage configuration label for long cases */
.card-config {
  font-size: 11px;
  color: #555;
  font-style: italic;
  margin-bottom: 8px;
}

.pluck-label {
  font-size: 11px;
  color: #1565c0;
  font-weight: 700;
  margin-bottom: 10px;
  font-style: italic;
}

.shop-btn {
  display: block;
  background: var(--c1-red);
  color: var(--c1-white);
  text-decoration: none;
  text-align: center;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px;
  border-radius: var(--radius);
  transition: background 0.15s;
}
.shop-btn:hover { background: #c20018; }

/* BAGS */
.bags-section {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 2px solid var(--c1-border);
}
.bags-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.bag-pill {
  background: var(--c1-white);
  border: 1px solid var(--c1-border);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 700;
  color: var(--c1-black);
  padding: 6px 12px;
  text-decoration: none;
  transition: all 0.15s;
}
.bag-pill:hover { border-color: var(--c1-red); color: var(--c1-red); background: #fff5f5; }

/* ACCESSORIES */
.accessories-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 2px solid var(--c1-border);
}
.acc-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.acc-pill {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 11px;
  border-radius: 2px;
  background: var(--c1-lgray);
  color: #555;
  border: 1px solid var(--c1-border);
  text-decoration: none;
  transition: all 0.15s;
}
.acc-pill:hover { border-color: var(--c1-black); color: var(--c1-black); }

/* NO FIT */
.no-fit-msg {
  background: var(--c1-white);
  border: 2px dashed var(--c1-border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  color: #888;
  font-size: 13px;
  font-weight: 700;
}

/* FOOTER */
.widget-footer {
  background: var(--c1-gray);
  padding: 16px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.footer-item {
  font-size: 11px;
  color: #bbb;
  line-height: 1.5;
}
.footer-item strong { color: var(--c1-white); display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.footer-item a { color: #bbb; text-decoration: underline; }
.footer-item a:hover { color: var(--c1-white); }

/* RESPONSIVE */
@media (max-width: 560px) {
  .item-row { grid-template-columns: 1fr auto; }
  .item-row .type-sel { grid-column: 1 / -1; }
  .widget-body { padding: 16px; }
  .widget-header { padding: 14px 16px; }
  .case-cards { grid-template-columns: 1fr; }
  .widget-footer { grid-template-columns: 1fr 1fr; padding: 14px 16px; }
}
</style>
</head>

let itemRows = [];
let rowCounter = 0;

function buildSearchList(type) {
  if (type === "Other Gear") return GEAR;
  // ADDITION 2: Shotgun maps to "shotgun"; PART 5: SBR maps to "sbr"
  const subType = type === "Semi-Auto Handgun" ? "semi"
                : type === "Revolver"           ? "revolver"
                : type === "Shotgun"            ? "shotgun"
                : type === "SBR"                ? "sbr"
                : "longgun";
  return FIREARMS.filter(f => f.type === subType);
}

function getPlaceholder(type) {
  if (type === "Other Gear") return "What are you protecting? (DJI Mavic 3, MacBook Pro, etc.)";
  return "What are you packing? (Glock 19, AR-15, etc.)";
}

function createRow() {
  const rowId = ++rowCounter;
  const state = { id: rowId, type: "Semi-Auto Handgun", selectedItem: null, manualL: "", manualW: "", manualH: "" };
  itemRows.push(state);

  const row = document.createElement("div");
  row.className = "item-row";
  row.dataset.rowId = rowId;
  row.innerHTML = `
    <select class="type-sel">
      <option>Semi-Auto Handgun</option>
      <option>Revolver</option>
      <option>Shotgun</option>
      <option>Long Gun</option>
      <option>SBR</option>
      <option>Other Gear</option>
    </select>
    <div class="item-input-area">
      <div class="autocomplete-wrap">
        <input type="text" class="model-input" placeholder="What are you packing? (Glock 19, AR-15, etc.)">
        <ul class="autocomplete-dropdown" role="listbox"></ul>
      </div>
      <!-- ADDITION 1: verified dimensions shown on selection (firearms only) -->
      <div class="selected-dims"></div>
      <div class="manual-dims">
        <span class="dim-label">Don't see it? Drop in the dimensions.</span>
        <input type="number" class="dim-l" placeholder="L" min="0" step="0.01">
        <span class="dim-sep">x</span>
        <input type="number" class="dim-w" placeholder="W" min="0" step="0.01">
        <span class="dim-sep">x</span>
        <input type="number" class="dim-h" placeholder="H" min="0" step="0.01">
        <span class="dim-label" style="margin-left:2px">in</span>
      </div>
    </div>
    <button class="remove-btn" title="Remove item" aria-label="Remove item">&#10005;</button>
  `;

  const sel     = row.querySelector(".type-sel");
  const input   = row.querySelector(".model-input");
  const dropdown= row.querySelector(".autocomplete-dropdown");
  const dimL    = row.querySelector(".dim-l");
  const dimW    = row.querySelector(".dim-w");
  const dimH    = row.querySelector(".dim-h");
  const removeBtn = row.querySelector(".remove-btn");
  // ADDITION 1: reference to the dim-display element
  const dimDisplay = row.querySelector(".selected-dims");

  // Type change — refresh autocomplete list, update placeholder
  sel.addEventListener("change", () => {
    const s = itemRows.find(r => r.id === rowId);
    s.type = sel.value;
    s.selectedItem = null;
    input.value = "";
    input.placeholder = getPlaceholder(sel.value);
    dropdown.innerHTML = "";
    dropdown.classList.remove("open");
    // ADDITION 1: hide dims on type change
    dimDisplay.textContent = "";
    dimDisplay.classList.remove("visible");
  });

  // Autocomplete
  let activeIdx = -1;
  input.addEventListener("input", () => {
    const s = itemRows.find(r => r.id === rowId);
    s.selectedItem = null;
    // ADDITION 1: hide dims when selection is cleared
    dimDisplay.textContent = "";
    dimDisplay.classList.remove("visible");
    const q = input.value.toLowerCase().trim();
    dropdown.innerHTML = "";
    activeIdx = -1;
    if (!q) { dropdown.classList.remove("open"); return; }
    const list = buildSearchList(sel.value);
    const matches = list.filter(i => i.label.toLowerCase().includes(q)).slice(0, 12);
    if (!matches.length) { dropdown.classList.remove("open"); return; }
    matches.forEach((item, i) => {
      const li = document.createElement("li");
      li.textContent = item.label;
      li.setAttribute("role", "option");
      li.addEventListener("mousedown", e => { e.preventDefault(); selectItem(item, s, input, dropdown, dimDisplay); });
      dropdown.appendChild(li);
    });
    dropdown.classList.add("open");
  });

  input.addEventListener("keydown", e => {
    const lis = dropdown.querySelectorAll("li");
    if (e.key === "ArrowDown") { e.preventDefault(); activeIdx = Math.min(activeIdx+1, lis.length-1); lis.forEach((l,i) => l.classList.toggle("active", i===activeIdx)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); lis.forEach((l,i) => l.classList.toggle("active", i===activeIdx)); }
    else if (e.key === "Enter" && activeIdx >= 0) {
      const s = itemRows.find(r => r.id === rowId);
      const list = buildSearchList(sel.value);
      const q = input.value.toLowerCase().trim();
      const matches = list.filter(i => i.label.toLowerCase().includes(q));
      if (matches[activeIdx]) selectItem(matches[activeIdx], s, input, dropdown, dimDisplay);
    }
    else if (e.key === "Escape") { dropdown.classList.remove("open"); }
  });

  input.addEventListener("blur", () => setTimeout(() => dropdown.classList.remove("open"), 150));

  // Manual dims
  [dimL, dimW, dimH].forEach((el, i) => {
    el.addEventListener("input", () => {
      const s = itemRows.find(r => r.id === rowId);
      s.selectedItem = null; // clear autocomplete if user types manual
      if (i===0) s.manualL = el.value;
      if (i===1) s.manualW = el.value;
      if (i===2) s.manualH = el.value;
    });
  });

  removeBtn.addEventListener("click", () => {
    itemRows = itemRows.filter(r => r.id !== rowId);
    row.remove();
    if (itemRows.length === 0) addRow();
  });

  return row;
}

function selectItem(item, stateObj, input, dropdown, dimDisplay) {
  stateObj.selectedItem = item;
  input.value = item.label;
  dropdown.classList.remove("open");
  dropdown.innerHTML = "";
  // ADDITION 1: show verified dimensions for firearms; hide for Other Gear
  // item.type exists on FIREARMS entries; category exists on GEAR entries
  if (item.type && stateObj.type !== "Other Gear") {
    dimDisplay.textContent = `L: ${item.L.toFixed(2)}" | W: ${item.W.toFixed(2)}" | H: ${item.H.toFixed(2)}"`;
    dimDisplay.classList.add("visible");
  } else {
    dimDisplay.textContent = "";
    dimDisplay.classList.remove("visible");
  }
}

function addRow() {
  const row = createRow();
  document.getElementById("itemList").appendChild(row);
}

// Initialize with one row
addRow();
document.getElementById("addItemBtn").addEventListener("click", addRow);

/* ================================================================
   SECTION 6: COMPATIBILITY ENGINE
   
   PART 1 — Orientation-Aware Axis Mapping:
   Handguns/Revolvers: upright storage
     - OAL → case length (L axis)
     - Width (slide/cylinder) → case width (W axis, per-gun, summed)
     - Height → case depth (H axis)
   Long Guns/Shotguns/SBR: side storage
     - OAL → case length (L axis)
     - Firearm height (H) → case width (W axis, summed for multi-gun)
     - Receiver width (W) → case depth (H axis)
   
   PART 6 — Three-Tier Clearance Classification:
   Comfortable: all axes ≥ 0.5" clearance (Pass 2) or ≥ 0.25" (Pass 1)
   Snug: any axis 0.25"–0.49" (Pass 2) or < 0.25" but > 0 (Pass 1)
   Does not fit: any axis ≤ 0 — excluded entirely
   
   Pre-check routing (before Pass 1):
   - Revolver-only 1–3: check #310 first (Addition 4)
   - SBR-only: check #2332 first (Part 5)
   ================================================================ */

const CLEARANCE_SLOT_COMFORTABLE = 0.25; // Pass 1 comfortable threshold
const CLEARANCE_INTERIOR_COMFORTABLE = 0.50; // Pass 2 comfortable threshold
const CLEARANCE_BUFFER  = 0.25; // inter-item buffer per additional item

// PART 1: firearm types that use side-lying orientation
const SIDE_LYING_TYPES = new Set(["longgun","shotgun","sbr"]);

function isSideLying(rowState) {
  // Returns true for long guns, shotguns, SBRs
  if (rowState.selectedItem) return SIDE_LYING_TYPES.has(rowState.selectedItem.type);
  // For manual-entry rows, infer from the type selector
  return rowState.type === "Long Gun" || rowState.type === "Shotgun" || rowState.type === "SBR";
}

function getItemDimensions(rowState) {
  // Returns [L, W, H] or null — raw manufacturer dims, orientation applied in matching
  if (rowState.selectedItem) {
    const it = rowState.selectedItem;
    return [it.L, it.W, it.H];
  }
  const l = parseFloat(rowState.manualL);
  const w = parseFloat(rowState.manualW);
  const h = parseFloat(rowState.manualH);
  if (!isNaN(l) && !isNaN(w) && !isNaN(h) && l>0 && w>0 && h>0) return [l, w, h];
  return null;
}

// PART 6: classify clearance tier for a single axis delta
function clearanceTier(delta) {
  if (delta <= 0) return "nofit";       // excluded
  if (delta < 0.25) return "verysnug";  // show with warning
  if (delta < 0.50) return "snug";      // show with warning
  return "comfortable";                  // show clean
}

// PART 6: worst tier across axes
function worstTier(tiers) {
  if (tiers.includes("nofit")) return "nofit";
  if (tiers.includes("verysnug")) return "snug"; // verysnug and snug both show warning
  if (tiers.includes("snug")) return "snug";
  return "comfortable";
}

// PART 1 + PART 6: check one firearm against a pre-cut slot (Pass 1)
// Returns tier string: "nofit" | "snug" | "comfortable"
function slotFitTier(itemDims, slot, rowState) {
  const [iL, iW, iH] = itemDims;
  let axisDeltas;

  if (slot.orientation === "side") {
    // PART 1: side-lying long guns/shotguns/SBR
    // OAL → slotL; firearm height (H) → slotW; receiver width (W) → slotD
    axisDeltas = [slot.L - iL, slot.W - iH, slot.D - iW];
  } else {
    // Upright: OAL → slotL; firearm width (W) → slotW; height (H) → slotD
    axisDeltas = [slot.L - iL, slot.W - iW, slot.D - iH];
  }

  // PART 6: tier each axis with the Pass 1 comfortable threshold (0.25")
  const tiers = axisDeltas.map(d => {
    if (d <= 0) return "nofit";
    if (d < 0.25) return "verysnug";
    return "comfortable";
  });
  return worstTier(tiers);
}

// PART 1 + PART 6: check items against case interior (Pass 2)
// Returns tier string for the whole load
function interiorFitTier(allRows, caseObj) {
  const dims = allRows.map(r => getItemDimensions(r)).filter(Boolean);
  if (!dims.length) return "nofit";
  const [cL, cW, cH] = caseObj.interior;

  // PART 1: separate side-lying and upright items
  const sideDims  = allRows.filter(r => isSideLying(r)).map(r => getItemDimensions(r)).filter(Boolean);
  const uprightDims = allRows.filter(r => !isSideLying(r)).map(r => getItemDimensions(r)).filter(Boolean);

  let axisDeltas;

  if (sideDims.length > 0 && uprightDims.length === 0) {
    // All side-lying:
    // Length axis: max OAL vs cL
    // Width axis: sum of heights + buffers vs cW (side-by-side)
    // Depth axis: max receiver width vs cH
    const maxOAL = Math.max(...sideDims.map(d => d[0]));
    const totalH = sideDims.reduce((s, d) => s + d[2], 0) + (sideDims.length - 1) * CLEARANCE_BUFFER;
    const maxW   = Math.max(...sideDims.map(d => d[1]));
    axisDeltas = [cL - maxOAL, cW - totalH, cH - maxW];

  } else if (uprightDims.length > 0 && sideDims.length === 0) {
    // All upright (handguns/revolvers):
    // Length axis: max OAL vs cL
    // Width axis: sum of widths + buffers vs cW
    // Depth axis: max height vs cH
    const maxOAL  = Math.max(...uprightDims.map(d => d[0]));
    const totalW  = uprightDims.reduce((s, d) => s + d[1], 0) + (uprightDims.length - 1) * CLEARANCE_BUFFER;
    const maxH    = Math.max(...uprightDims.map(d => d[2]));
    axisDeltas = [cL - maxOAL, cW - totalW, cH - maxH];

  } else {
    // Mixed upright + side-lying (suppression should handle most cases, but fallback safe):
    // Use worst-axis combined footprint
    const maxOAL = Math.max(...dims.map(d => d[0]));
    const totalW = dims.reduce((s, d) => s + d[1], 0) + (dims.length - 1) * CLEARANCE_BUFFER;
    const maxH   = Math.max(...dims.map(d => d[2]));
    axisDeltas = [cL - maxOAL, cW - totalW, cH - maxH];
  }

  // PART 6: tier each axis with the Pass 2 comfortable threshold (0.5")
  const tiers = axisDeltas.map(d => {
    if (d <= 0) return "nofit";
    if (d < 0.25) return "verysnug";
    if (d < 0.50) return "snug";
    return "comfortable";
  });
  return worstTier(tiers);
}

function pass1Match(firearmRows) {
  // Returns array of { caseId, allFit, snug }
  const results = [];
  CASES.forEach(c => {
    if (!c.precutFoamAvailable || !c.precutSlots.length) return;
    const slot = c.precutSlots[0];

    // All firearms must fit
    let worstOverall = "comfortable";
    for (const row of firearmRows) {
      const dims = getItemDimensions(row);
      if (!dims) { worstOverall = "nofit"; break; }
      const tier = slotFitTier(dims, slot, row);
      if (tier === "nofit") { worstOverall = "nofit"; break; }
      if (tier === "snug") worstOverall = "snug";
    }
    if (worstOverall !== "nofit") {
      results.push({ caseId: c.id, allFit: true, snug: worstOverall === "snug" });
    }
  });
  return results;
}

function pass2Match(allRows) {
  // PART 2: #2191 gating — only surface for 3+ long-gun/rifle selections
  const longGunRows = allRows.filter(r => {
    const t = r.type || (r.selectedItem && r.selectedItem.type);
    return t === "Long Gun" || t === "Shotgun" || t === "SBR" ||
           (r.selectedItem && SIDE_LYING_TYPES.has(r.selectedItem.type));
  });
  const longGunCount = longGunRows.length;

  const results = [];
  CASES.forEach(c => {
    if (!c.pluckableFoam && !c.precutFoamAvailable) return;

    // PART 2: #2191 — only surface for 3 or 4 rifle/longgun selections
    if (c.id === "2191" && c.storageConfig && c.storageConfig.multiRifleOnly) {
      if (longGunCount < 3) return;
    }

    // PART 2: #229 — single rifle only; skip for multi-gun loads
    if (c.id === "229" && c.storageConfig && c.storageConfig.capacity === 1) {
      if (allRows.length > 1) return;
    }

    const tier = interiorFitTier(allRows, c);
    if (tier !== "nofit") {
      results.push({ caseId: c.id, snug: tier === "snug" });
    }
  });

  // PART 6: sort by interior volume ascending (best fit first)
  results.sort((a, b) => {
    const volA = (() => { const [l,w,h] = CASES.find(c=>c.id===a.caseId).interior; return l*w*h; })();
    const volB = (() => { const [l,w,h] = CASES.find(c=>c.id===b.caseId).interior; return l*w*h; })();
    return volA - volB;
  });
  return results;
}

/* ================================================================
   SECTION 7: SUPPRESSION RULES & RESULT RENDERING
   ================================================================ */

function runFinder() {
  const resolvedRows = itemRows.filter(r => getItemDimensions(r) !== null);
  if (!resolvedRows.length) {
    alert("Add at least one item with a model selected or dimensions entered.");
    return;
  }

  const firearmRows  = resolvedRows.filter(r => r.type !== "Other Gear");
  const gearRows     = resolvedRows.filter(r => r.type === "Other Gear");
  const hasFirearms  = firearmRows.length > 0;
  const hasGear      = gearRows.length > 0;
  const hasRevolvers = firearmRows.filter(r => r.type === "Revolver").length > 0;
  const hasSemis     = firearmRows.filter(r => r.type === "Semi-Auto Handgun").length > 0;
  const hasLongGuns  = firearmRows.filter(r => r.type === "Long Gun").length > 0;
  // ADDITION 2: Shotguns are a firearm sub-type; follow same suppression rules as long guns
  const hasShotguns  = firearmRows.filter(r => r.type === "Shotgun").length > 0;
  // PART 5: SBR is a firearm sub-type
  const hasSBRs      = firearmRows.filter(r => r.type === "SBR").length > 0;
  const multiType    = (hasSemis && hasRevolvers) || (hasFirearms && hasGear) ||
                       (hasSemis && hasLongGuns) || (hasRevolvers && hasLongGuns) ||
                       (hasSemis && hasShotguns) || (hasRevolvers && hasShotguns) ||
                       (hasLongGuns && hasShotguns) ||
                       (hasSBRs && (hasSemis || hasRevolvers || hasLongGuns || hasShotguns));

  /* --- SUPPRESSION LOGIC ---
     Suppress pre-cut when:
     1. Revolver + any other item (combo)
     2. Any firearm + non-firearm gear
     3. Non-firearm gear only (no dedicated firearm foam)
     4. Multiple different firearm types mixed
     ADDITION 2: Shotgun + revolver also suppresses pre-cut
     PART 5: SBR + other type also suppresses pre-cut
  */
  const suppressPrecut = multiType || (!hasFirearms && hasGear) ||
                         (hasRevolvers && (hasSemis || hasLongGuns || hasShotguns || hasSBRs));

  // Pass 1 (with pre-checks)
  let precutResults = [];

  // ADDITION 4: #310 PRE-CHECK — revolvers only, 1–3 guns
  let revolverPriorityResult = null;
  const revolverRows = resolvedRows.filter(r => r.type === "Revolver");
  const revolverOnlyList = resolvedRows.length > 0 && revolverRows.length === resolvedRows.length;
  if (revolverOnlyList && revolverRows.length >= 1 && revolverRows.length <= 3) {
    const case310 = CASES.find(c => c.id === "310");
    const slot310 = case310 && case310.precutSlots[0];
    if (slot310) {
      let worst = "comfortable";
      for (const row of revolverRows) {
        const dims = getItemDimensions(row);
        if (!dims) { worst = "nofit"; break; }
        const tier = slotFitTier(dims, slot310, row);
        if (tier === "nofit") { worst = "nofit"; break; }
        if (tier === "snug") worst = "snug";
      }
      if (worst !== "nofit") {
        revolverPriorityResult = { caseId:"310", allFit:true, snug: worst==="snug", priority310:true };
      }
    }
  }

  // PART 5: #2332 SBR PRE-CHECK — SBRs only
  let sbrPriorityResult = null;
  const sbrRows = resolvedRows.filter(r => r.type === "SBR");
  const sbrOnlyList = resolvedRows.length > 0 && sbrRows.length === resolvedRows.length;
  if (sbrOnlyList && sbrRows.length >= 1) {
    const case2332 = CASES.find(c => c.id === "2332");
    const slot2332 = case2332 && case2332.precutSlots[0];
    if (slot2332) {
      let worst = "comfortable";
      for (const row of sbrRows) {
        const dims = getItemDimensions(row);
        if (!dims) { worst = "nofit"; break; }
        const tier = slotFitTier(dims, slot2332, row);
        if (tier === "nofit") { worst = "nofit"; break; }
        if (tier === "snug") worst = "snug";
      }
      if (worst !== "nofit") {
        sbrPriorityResult = { caseId:"2332", allFit:true, snug: worst==="snug",
          priorityBadge:"Purpose-built for SBRs." };
      }
    }
  }

  if (!suppressPrecut && hasFirearms) {
    precutResults = pass1Match(firearmRows);
    // Prepend priority results, deduplicating
    if (revolverPriorityResult) {
      precutResults = precutResults.filter(r => r.caseId !== "310");
      precutResults = [revolverPriorityResult, ...precutResults];
    }
    if (sbrPriorityResult) {
      precutResults = precutResults.filter(r => r.caseId !== "2332");
      precutResults = [sbrPriorityResult, ...precutResults];
    }
  } else if (!suppressPrecut && (revolverPriorityResult || sbrPriorityResult)) {
    if (revolverPriorityResult) precutResults = [revolverPriorityResult];
    if (sbrPriorityResult) precutResults = [sbrPriorityResult];
  }

  // Pass 2
  const pluckableResults = pass2Match(resolvedRows);

  // Render
  renderResults(precutResults, pluckableResults, suppressPrecut, hasFirearms, hasGear, resolvedRows);
}

function renderResults(precutResults, pluckableResults, suppressPrecut, hasFirearms, hasGear, resolvedRows) {
  const section = document.getElementById("resultsSection");
  const inner   = document.getElementById("resultsInner");
  const banner  = document.getElementById("suppressionBanner");

  section.classList.add("visible");
  inner.innerHTML = "";

  // Suppression banner
  if (suppressPrecut && hasFirearms) {
    banner.textContent = "Pre-cut foam doesn't work for this combo. Pluckable foam fits everything — carve it to your exact kit.";
    banner.classList.add("visible");
  } else {
    banner.classList.remove("visible");
  }

  // PRE-CUT SECTION (Pass 1)
  if (!suppressPrecut && precutResults.length > 0) {
    const label = document.createElement("div");
    label.className = "results-group-label";
    label.textContent = "Pre-Cut Foam — Ready to Load";
    inner.appendChild(label);

    const hasRevolverOnly = resolvedRows.every(r => r.type === "Revolver");
    // Sort: priority items already prepended in runFinder; sort rest by volume
    let sortedPrecut = [...precutResults];
    const priorityCaseIds = new Set(sortedPrecut.filter(r => r.priority310 || r.priorityBadge).map(r => r.caseId));
    const nonPriority = sortedPrecut.filter(r => !priorityCaseIds.has(r.caseId));
    nonPriority.sort((a, b) => {
      const volA = (() => { const [l,w,h] = CASES.find(c=>c.id===a.caseId).interior; return l*w*h; })();
      const volB = (() => { const [l,w,h] = CASES.find(c=>c.id===b.caseId).interior; return l*w*h; })();
      return volA - volB;
    });
    sortedPrecut = [...sortedPrecut.filter(r => priorityCaseIds.has(r.caseId)), ...nonPriority];

    const grid = document.createElement("div");
    grid.className = "case-cards";
    sortedPrecut.filter(r => r.allFit !== false).forEach(result => {
      const c = CASES.find(c => c.id === result.caseId);
      if (!c) return;
      const isTopPick = result.priority310 === true || !!result.priorityBadge || (hasRevolverOnly && c.id === "310");
      const priorityBadgeText = result.priority310 ? "Purpose-built for revolvers."
                               : result.priorityBadge ? result.priorityBadge
                               : null;
      grid.appendChild(buildCaseCard(c, "precut", isTopPick, result.snug || false, false, priorityBadgeText));
    });
    if (grid.children.length) inner.appendChild(grid);
  }

  // PLUCKABLE SECTION (Pass 2)
  if (pluckableResults.length > 0) {
    const label = document.createElement("div");
    label.className = "results-group-label";
    label.textContent = suppressPrecut ? "Pluckable Foam — Shape It to Your Kit" : "Custom Fit with Pluckable Foam";
    inner.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "case-cards";

    // Surface #300 first for camera gear; #2191 badge for multi-rifle
    const hasCameraGear = resolvedRows.some(r => r.selectedItem && r.selectedItem.category === "camera");
    let sorted = [...pluckableResults];
    if (hasCameraGear) {
      sorted.sort((a, b) => (a.caseId === "300" ? -1 : b.caseId === "300" ? 1 : 0));
    }

    sorted.forEach(result => {
      const c = CASES.find(c => c.id === result.caseId);
      if (!c) return;
      grid.appendChild(buildCaseCard(c, "pluckable", false, result.snug, hasCameraGear && c.id === "300"));
    });
    if (grid.children.length) inner.appendChild(grid);
  }

  // NO FIT
  if (!precutResults.length && !pluckableResults.length) {
    const nf = document.createElement("div");
    nf.className = "no-fit-msg";
    nf.textContent = "Nothing fits off the shelf. Go pluckable — carve it to your exact gear.";
    inner.appendChild(nf);
  }

  // BAGS
  renderBags(hasFirearms, hasGear);
  // ACCESSORIES
  renderAccessories(precutResults, pluckableResults, hasFirearms);

  section.scrollIntoView({ behavior: "smooth", block: "start" });
}

function buildCaseCard(c, foamType, isTopPick, snug, cameraBadge, priorityBadgeText) {
  const card = document.createElement("div");
  card.className = "case-card" + (isTopPick ? " top-pick" : "");

  // ADDITION 4 / PART 5: priorityBadgeText takes precedence
  const badgeHTML = priorityBadgeText
    ? `<div class="card-badge">${priorityBadgeText}</div>`
    : isTopPick
      ? `<div class="card-badge">Top Pick</div>`
      : (cameraBadge ? `<div class="card-badge">Built for this.</div>` : "");

  const foamTagHTML = foamType === "precut"
    ? `<span class="tag tag-precut">Pre-Cut Foam</span>`
    : `<span class="tag tag-pluck">Pluckable Foam</span>`;

  const wheelTag = c.wheels ? `<span class="tag tag-wheel">Wheels</span>` : "";
  const lidTag   = c.lidOrg ? `<span class="tag tag-lidorg">Lid Organizer</span>` : "";

  // PART 6: three-tier warning — amber, not red; all clearance-above-zero cases shown
  const warnHTML = snug
    ? `<div class="card-warn">This may be a snug fit. Confirm your exact firearm dimensions closely before ordering.</div>`
    : "";

  const pluckLabelHTML = foamType === "pluckable"
    ? `<div class="pluck-label">Custom fit with pluckable foam — shape it to your exact setup.</div>`
    : "";

  // PART 2: configuration label for long gun / shotgun cases
  const configLabel = c.storageConfig ? c.storageConfig.configLabel : null;
  const configHTML  = configLabel ? `<div class="card-config">${configLabel}</div>` : "";

  const [L, W, H] = c.interior;
  const url = `https://condition1.com/products/${c.handle}`;

  card.innerHTML = `
    ${badgeHTML}
    <div class="card-inner">
      <div class="card-case-num">Case #${c.id}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-dims"><strong>Interior</strong><br>${L}" × ${W}" × ${H}"</div>
      <div class="card-tags">${foamTagHTML}${wheelTag}${lidTag}</div>
      ${configHTML}
      ${warnHTML}
      ${pluckLabelHTML}
      <a class="shop-btn" href="${url}" target="_blank">Shop Now</a>
    </div>
  `;
  return card;
}

function renderBags(hasFirearms, hasGear) {
  const section = document.getElementById("bagsSection");
  section.innerHTML = "";
  const label = document.createElement("div");
  label.className = "results-group-label";
  label.textContent = "Soft Carry Options";
  section.appendChild(label);
  const grid = document.createElement("div");
  grid.className = "bags-grid";
  BAGS.forEach(b => {
    if (b.firearmOnly && !hasFirearms) return;
    const a = document.createElement("a");
    a.className = "bag-pill";
    a.href = `https://condition1.com/products/${b.handle}`;
    a.target = "_blank";
    a.textContent = b.label;
    grid.appendChild(a);
  });
  section.appendChild(grid);
}

function renderAccessories(precutResults, pluckableResults, hasFirearms) {
  const section = document.getElementById("accessoriesSection");
  section.innerHTML = "";
  const label = document.createElement("div");
  label.className = "results-group-label";
  label.textContent = "Accessories";
  section.appendChild(label);
  const grid = document.createElement("div");
  grid.className = "acc-grid";

  const allMatched = [...precutResults.map(r=>r.caseId), ...pluckableResults.map(r=>r.caseId)];
  const hasLidOrgCase = allMatched.some(id => CASES.find(c => c.id === id && c.lidOrg));
  const multiItem = itemRows.filter(r => getItemDimensions(r)).length > 1;

  const accs = [];
  if (hasLidOrgCase) accs.push({ label:"Lid Organizers", url:"https://condition1.com/collections/lid-organizers" });
  if (multiItem) accs.push({ label:"Padded Dividers", url:"https://condition1.com/collections/padded-dividers" });
  if (!precutResults.length || !pluckableResults.length) accs.push({ label:"Replacement Pluckable Foam", url:"https://condition1.com/collections/replacement-foam" });
  accs.push({ label:"Combo Cable Locks", url:"https://condition1.com/products/condition-1-combo-locks-2pk" });
  accs.push({ label:"Keyed Gun Cable Locks", url:"https://condition1.com/products/keyed-15-cable-gun-locks-3pk" });

  accs.forEach(a => {
    const pill = document.createElement("a");
    pill.className = "acc-pill";
    pill.href = a.url;
    pill.target = "_blank";
    pill.textContent = a.label;
    grid.appendChild(pill);
  });
  section.appendChild(grid);
}

document.getElementById("findBtn").addEventListener("click", runFinder);
</script>

<!-- ================================================================
     SECTION 8: HOW IT WORKS (plain English)
     
     DATA FLOW:
     1. User builds item list. Each row is independent with its own
        type-selector (Semi-Auto / Revolver / Long Gun / Other Gear),
        model autocomplete, and manual L×W×H entry. Both autocomplete
        and manual entry work simultaneously per row.
     
     2. On "Find My Case" click, getItemDimensions() resolves each
        row to [L, W, H]. Selected autocomplete items use manufacturer-
        verified dimensions from FIREARMS/GEAR databases. Manual entries
        use user-typed values. Rows with no dimensions are skipped.
     
     PASS 1 — Pre-Cut Slot Match:
     - Runs only for firearm rows (not Other Gear).
     - For each case with precutFoamAvailable:true, checks whether
       EVERY firearm's [L, W, H] fits within the case's precutSlots
       dimensions with 0.25" clearance on all axes.
     - REVOLVER RULE: revolver W dimension is cylinder width (not grip).
       Cylinder widths are hard-coded per model in FIREARMS database.
     - #310 priority: if input contains only revolvers and #310 passes
       slot check, it is sorted to first position.
     
     PASS 2 — Pluckable Foam Match:
     - Runs for all gear types.
     - Multi-item footprint: combined width = sum of all item widths
       + 0.25" buffer per additional item. Max length = longest item.
       Max height = tallest item.
     - Case must provide 0.5" clearance on all three axes vs footprint.
     - Cases with depth clearance < 0.75" are flagged "marginal."
     
     FOAM SUPPRESSION (overrides Pass 1 results):
     - Revolver + any other item: suppress pre-cut entirely.
     - Firearm + non-firearm gear: suppress pre-cut.
     - Non-firearm only: no firearm pre-cut surfaced.
     - Suppression banner shown when pre-cut is suppressed.
     
     WHERE TO UPDATE DATA:
     - Add/edit cases: CASES array at top of <script>.
     - Add/edit firearms: FIREARMS array.
     - Add/edit gear: GEAR array.
     - All pre-cut slot dimensions: precutSlots[] within each case entry.
     - Bags: BAGS array.
     - Policies: widget-footer HTML.
================================================================== -->
